name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR Title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR Title: $TITLE"

          if [[ ! "$TITLE" =~ ^(Major|Minor|Patch).+ ]]; then
            echo "❌ PR title must start with Major, Minor, or Patch"
            exit 1
          fi

      - name: Validate Branch Rules
        run: |
          SOURCE="${{ github.head_ref }}"
          TARGET="${{ github.base_ref }}"

          echo "Source: $SOURCE"
          echo "Target: $TARGET"

          sprint_regex="^Sprint-Q[1-4]-[0-9]{2}\.[0-9]{2}\.[0-9]{2}$"
          hotfix_regex="^Hotfix-[a-zA-Z0-9_-]+-[0-9]{2}\.[0-9]{2}\.[0-9]{2}$"

          valid=false

          # Sprint/Hotfix -> UAT
          if [[ "$TARGET" == "UAT" ]]; then
            if [[ "$SOURCE" =~ $sprint_regex || "$SOURCE" =~ $hotfix_regex ]]; then
              valid=true
            fi
          fi

          # UAT/Hotfix -> PROD
          if [[ "$TARGET" == "PROD" ]]; then
            if [[ "$SOURCE" == "UAT" || "$SOURCE" =~ $hotfix_regex ]]; then
              valid=true
            fi
          fi

          # Hotfix -> Sprint
          if [[ "$TARGET" =~ $sprint_regex ]]; then
            if [[ "$SOURCE" =~ $hotfix_regex ]]; then
              valid=true
            fi
          fi

          if [[ "$valid" != true ]]; then
            echo "❌ Invalid branch merge:"
            echo "   $SOURCE → $TARGET is not allowed"
            exit 1
          fi

          echo "✅ Branch rules passed"
