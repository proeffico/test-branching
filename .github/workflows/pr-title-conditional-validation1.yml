name: Conditional PR title validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title (conditional)
        run: |
          # --------------------------------------------------
          # Get branch names (reliable source)
          # --------------------------------------------------
          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Normalize (trim + uppercase)
          SOURCE_BRANCH=$(echo "$SOURCE_BRANCH" | xargs | tr '[:lower:]' '[:upper:]')
          TARGET_BRANCH=$(echo "$TARGET_BRANCH" | xargs | tr '[:lower:]' '[:upper:]')

          echo "🔍 Source branch: $SOURCE_BRANCH"
          echo "🎯 Target branch: $TARGET_BRANCH"
          echo "📝 PR title: $PR_TITLE"

          # --------------------------------------------------
          # Regex definitions
          # --------------------------------------------------
          SPRINT_REGEX='^SPRINT.*'
          HOTFIX_REGEX='^HOTFIX.*'
          TITLE_REGEX='^(Major|Minor|Patch)\b'

          # --------------------------------------------------
          # Determine whether title validation is required
          # --------------------------------------------------
          VALIDATION_REQUIRED=false

          # Rule 1: Sprint* OR Hotfix* → UAT
          if [[ ( "$SOURCE_BRANCH" =~ $SPRINT_REGEX || "$SOURCE_BRANCH" =~ $HOTFIX_REGEX ) && "$TARGET_BRANCH" == "UAT" ]]; then
            VALIDATION_REQUIRED=true
          fi

          # Rule 2: UAT OR Hotfix* → PROD
          if [[ ( "$SOURCE_BRANCH" == "UAT" || "$SOURCE_BRANCH" =~ $HOTFIX_REGEX ) && "$TARGET_BRANCH" == "PROD" ]]; then
            VALIDATION_REQUIRED=true
          fi

          # --------------------------------------------------
          # Validation logic
          # --------------------------------------------------
          if [[ "$VALIDATION_REQUIRED" == true ]]; then
            echo "⚠️ PR title validation is REQUIRED for this branch flow"

            if [[ ! "$PR_TITLE" =~ $TITLE_REGEX ]]; then
              echo "❌ ERROR: Invalid PR title"
              echo ""
              echo "PR title must start with one of the following:"
              echo "  - Major"
              echo "  - Minor"
              echo "  - Patch"
              exit 1
            fi

            echo "✅ PR title is valid"
          else
            echo "ℹ️ PR title validation is NOT required for this branch flow"
          fi
