name: Conditional PR title validation

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  pr-title-check:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR title (conditional)
        run: |
          # --------------------------------------------------
          # Source and target branch names
          # --------------------------------------------------
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"
          PR_TITLE="${{ github.event.pull_request.title }}"

          echo "🔍 Source branch: $SOURCE_BRANCH"
          echo "🎯 Target branch: $TARGET_BRANCH"
          echo "📝 PR title: $PR_TITLE"

          # --------------------------------------------------
          # Regex definitions
          # --------------------------------------------------
          SPRINT_REGEX='^Sprint.*'
          HOTFIX_REGEX='^Hotfix.*'
          TITLE_REGEX='^(Major|Minor|Patch)\b'

          # --------------------------------------------------
          # Determine whether title validation is required
          # --------------------------------------------------
          VALIDATION_REQUIRED=false

          # Sprint* → UAT
          if [[ "$SOURCE_BRANCH" =~ $SPRINT_REGEX && "$TARGET_BRANCH" == "UAT" ]]; then
            VALIDATION_REQUIRED=true
          fi

          # UAT → PROD
          if [[ "$SOURCE_BRANCH" == "UAT" && "$TARGET_BRANCH" == "PROD" ]]; then
            VALIDATION_REQUIRED=true
          fi

          # Hotfix* → PROD / UAT / Sprint*
          if [[ "$SOURCE_BRANCH" =~ $HOTFIX_REGEX && \
                ( "$TARGET_BRANCH" == "PROD" || "$TARGET_BRANCH" == "UAT" || "$TARGET_BRANCH" =~ $SPRINT_REGEX ) ]]; then
            VALIDATION_REQUIRED=true
          fi

          # --------------------------------------------------
          # If validation is required, enforce title rule
          # --------------------------------------------------
          if [[ "$VALIDATION_REQUIRED" == true ]]; then
            echo "⚠️ PR title validation is REQUIRED for this branch flow"

            if [[ ! "$PR_TITLE" =~ $TITLE_REGEX ]]; then
              echo "❌ ERROR: Invalid PR title"
              echo ""
              echo "PR title must start with one of the following:"
              echo "  - Major"
              echo "  - Minor"
              echo "  - Patch"
              exit 1
            fi

            echo "✅ PR title is valid"
          else
            echo "ℹ️ PR title validation is NOT required for this branch flow"
          fi
